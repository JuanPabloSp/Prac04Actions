name: Secure Deployment Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

# Parte 2 - Permissions a nivel de workflow
# Definimos permisos globales mínimos (solo lectura del contenido del repositorio).
# Esto evita que tokens comprometidos tengan permisos de escritura.
permissions:
  contents: read

jobs:
  # Job 1: Construcción/Validación de la aplicación
  build:
    name: Build & Lint Application
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # actions/checkout@v4.2.2
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-python@v5.1.0
      - name: Setup Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: '3.11'

      - name: Syntax Compilation Check (Build)
        run: |
          echo "Compilando código Python..."
          python -m py_compile app.py
          mkdir -p dist
          cp app.py dist/
          echo "Validación de construcción finalizada con éxito."

      - name: Upload Build Artifacts
        # actions/upload-artifact@v4.4.3
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: build-artifact
          path: dist/
          retention-days: 1

  # Job 2: Validación mediante Tests Unitarios
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # actions/checkout@v4.2.2
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-python@v5.1.0
      - name: Setup Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: '3.11'

      - name: Run Test Suite
        run: python -m unittest test_app.py

  # Job 3: Despliegue en Staging (Pre-producción)
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    # Parte 4 - Conditions: El despliegue requiere que el build y los tests pasen exitosamente
    needs: [build, test]
    # Parte 3 - Environments: Vinculación con el entorno "staging"
    environment:
      name: staging
      url: https://staging.example.com
    permissions:
      contents: read
    
    steps:
      - name: Download Build Artifacts
        # actions/download-artifact@v4.1.7
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: build-artifact
          path: dist/

      # Parte 1 - Secrets: Uso seguro de secretos inyectados como variables de entorno
      # NUNCA se debe imprimir o usar echo para mostrar secretos en los logs
      - name: Deploy to Staging Environment
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          API_KEY: ${{ secrets.API_KEY }}
          API_URL: ${{ vars.API_URL }}
        run: |
          echo "Iniciando despliegue seguro en Staging..."
          echo "URL de la API configurada (Var no sensible): $API_URL"
          
          # Validamos que los secretos no estén vacíos sin imprimirlos
          if [ -z "$DEPLOY_TOKEN" ] || [ -z "$API_KEY" ]; then
            echo "::error::Faltan secretos de despliegue críticos."
            exit 1
          fi
          
          # Simulación del despliegue seguro de la app de Python
          echo "Desplegando artefactos Python a través de conexión segura..."
          echo "Despliegue en Staging finalizado con éxito."

  # Job 4: Despliegue en Producción
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # Parte 4 - Conditions:
    # 1. Solo si tests y build son correctos
    needs: [build, test]
    # 2. Solo desde la rama principal 'main'
    if: github.ref == 'refs/heads/main'
    
    # Parte 3 - Environments: Vinculación con el entorno "production"
    # Este entorno tiene configuradas reglas de protección en GitHub (Aprobación manual y revisores)
    environment:
      name: production
      url: https://production.example.com
    
    permissions:
      contents: read
      
    steps:
      - name: Download Build Artifacts
        # actions/download-artifact@v4.1.7
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: build-artifact
          path: dist/

      # Parte 1 - Secrets: Uso seguro de secretos de entorno específicos de Producción
      - name: Deploy to Production Environment
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          API_KEY: ${{ secrets.API_KEY }}
          API_URL: ${{ vars.API_URL }}
        run: |
          echo "Iniciando despliegue altamente seguro en PRODUCCIÓN..."
          echo "Validando entorno de producción..."
          echo "URL de la API en Producción: $API_URL"
          
          if [ -z "$DEPLOY_TOKEN" ] || [ -z "$API_KEY" ]; then
            echo "::error::ERROR CRÍTICO: Faltan secretos de despliegue en Producción."
            exit 1
          fi
          
          echo "Desplegando la aplicación Python en la infraestructura de producción principal..."
          echo "🚀 ¡Despliegue en Producción completado exitosamente!"
